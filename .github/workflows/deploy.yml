name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required SSH secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::Missing required secret: SSH_HOST"
            exit 1
          fi

          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "::error::Missing required secret: SSH_USER"
            exit 1
          fi

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing required secret: SSH_PRIVATE_KEY"
            echo "::error::Go to Settings > Secrets and variables > Actions and register SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          eval "$(ssh-agent -s)"

          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/\r$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -yf ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is invalid. Ensure the key is in PEM/OpenSSH format with line breaks preserved."
            echo "::error::If you copied from Windows, remove CRLF and re-save the secret."
            exit 1
          fi

          ssh-add ~/.ssh/deploy_key

      - name: Write .env file
        run: |
          cat << 'EOT' > .env
          CONTRACT_ADDRESS=${{ secrets.CONTRACT_ADDRESS }}
          POLYGON_RPC_URL=${{ secrets.POLYGON_RPC_URL }}
          GAS_WEBHOOK_URL=${{ secrets.GAS_WEBHOOK_URL }}
          START_BLOCK=${{ secrets.START_BLOCK }}
          POLL_INTERVAL=${{ secrets.POLL_INTERVAL }}
          EOT

      - name: Deploy with Docker Compose
        run: docker compose up --build -d
        env:
          DOCKER_HOST: ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          COMPOSE_PROJECT_NAME: mltg-mint-announce
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
