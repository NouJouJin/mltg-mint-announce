name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required SSH secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::Missing required secret: SSH_HOST"
            exit 1
          fi

          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "::error::Missing required secret: SSH_USER"
            exit 1
          fi

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing required secret: SSH_PRIVATE_KEY"
            echo "::error::Go to Settings > Secrets and variables > Actions and register SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          install -m 700 -d ~/.ssh

          python3 - <<'PYKEY'
          import base64
          import os
          import re
          from pathlib import Path

          raw = os.environ["SSH_PRIVATE_KEY"].strip()
          candidates = []

          PEM_HEADERS = (
              "BEGIN OPENSSH PRIVATE KEY",
              "BEGIN RSA PRIVATE KEY",
              "BEGIN EC PRIVATE KEY",
              "BEGIN DSA PRIVATE KEY",
              "BEGIN PRIVATE KEY",
          )

          def is_pem(value: str) -> bool:
              return any(h in value for h in PEM_HEADERS)

          def add_candidate(value: str):
              value = value.strip()
              if value and value not in candidates:
                  candidates.append(value)

          # 1) raw value as-is
          add_candidate(raw)
          # 2) normalise line endings
          add_candidate(raw.replace("\r\n", "\n").replace("\r", "\n"))
          # 3) literal backslash-n to real newline
          add_candidate(raw.replace("\\n", "\n"))
          add_candidate(raw.replace("\\n", "\n").replace("\r\n", "\n").replace("\r", "\n"))
          # 4) spaces may have replaced newlines during copy-paste
          add_candidate(re.sub(r"(?<=-----) | (?=-----)", "\n", raw))
          add_candidate(raw.replace(" ", "\n"))

          # 5) base64-encoded PEM
          compact = "".join(raw.split())
          try:
              decoded = base64.b64decode(compact, validate=True).decode("utf-8")
              add_candidate(decoded)
              add_candidate(decoded.replace("\r\n", "\n").replace("\r", "\n"))
          except Exception:
              pass

          out = Path.home() / ".ssh" / "id_rsa"
          for candidate in candidates:
              if is_pem(candidate):
                  out.write_text(candidate.rstrip("\n") + "\n")
                  break
          else:
              # --- detailed diagnostics (no secret leakage) ---
              hint = raw[:30] if len(raw) > 30 else raw
              # mask middle of the hint to avoid leaking key material
              if len(hint) > 10:
                  hint = hint[:5] + "*" * (len(hint) - 10) + hint[-5:]

              lines = raw.splitlines()
              diag = (
                  f"  length={len(raw)}, lines={len(lines)}, "
                  f"first_chars(masked)=[{hint}]"
              )

              msgs = [
                  "::error::SSH_PRIVATE_KEY format was not recognized.",
                  f"::error::Diagnostics:{diag}",
              ]
              if raw.startswith("PuTTY-User-Key-File"):
                  msgs.append(
                      "::error::PuTTY format (.ppk) detected. Convert with: "
                      "puttygen key.ppk -O private-openssh -o id_ed25519"
                  )
              elif raw.startswith("ssh-rsa ") or raw.startswith("ssh-ed25519 "):
                  msgs.append(
                      "::error::This looks like a PUBLIC key. "
                      "Register the PRIVATE key instead (e.g. id_ed25519, not id_ed25519.pub)."
                  )
              elif raw.startswith("---- BEGIN SSH2"):
                  msgs.append(
                      "::error::SSH2 format detected. Convert with: "
                      "ssh-keygen -i -f key_ssh2 > id_rsa"
                  )
              else:
                  msgs.append(
                      "::error::Expected PEM/OpenSSH private key starting with "
                      "'-----BEGIN OPENSSH PRIVATE KEY-----' or '-----BEGIN RSA PRIVATE KEY-----'. "
                      "Ensure the FULL key (including header/footer lines) is pasted into the Secret."
                  )
              raise SystemExit("\n".join(msgs))
          PYKEY

          chmod 600 ~/.ssh/id_rsa

          if ! ssh-keygen -yf ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY could not be parsed. If stored on one line, replace literal \n with actual newlines or use base64-encoded PEM."
            exit 1
          fi

          echo "::group::SSH key info (public fingerprint)"
          ssh-keygen -lf ~/.ssh/id_rsa
          echo "Public key to register on server:"
          ssh-keygen -yf ~/.ssh/id_rsa
          echo "::endgroup::"

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Configure SSH to always use this key for the target host
          cat >> ~/.ssh/config <<SSHCFG
          Host $SSH_HOST
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking no
          SSHCFG
          chmod 600 ~/.ssh/config

      - name: Verify SSH connectivity
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          echo "Testing SSH connection to $SSH_HOST..."
          if ! ssh -vvv -o BatchMode=yes -o ConnectTimeout=10 "$SSH_USER@$SSH_HOST" "echo 'SSH connection successful'; docker version --format '{{.Server.Version}}'" 2>&1; then
            echo ""
            echo "::error::SSH authentication failed."
            echo "::error::The public key shown above must be added to the server's ~/.ssh/authorized_keys."
            echo "::error::Run on the server: echo '<public-key>' >> ~/.ssh/authorized_keys"
            echo "::error::You can find the public key in the 'SSH key info' group output above."
            exit 1
          fi

      - name: Write .env file
        run: |
          cat << 'EOT' > .env
          CONTRACT_ADDRESS=${{ secrets.CONTRACT_ADDRESS }}
          POLYGON_RPC_URL=${{ secrets.POLYGON_RPC_URL }}
          GAS_WEBHOOK_URL=${{ secrets.GAS_WEBHOOK_URL }}
          START_BLOCK=${{ secrets.START_BLOCK }}
          POLL_INTERVAL=${{ secrets.POLL_INTERVAL }}
          EOT

      - name: Deploy with Docker Compose
        run: docker compose up --build -d
        env:
          DOCKER_HOST: ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          COMPOSE_PROJECT_NAME: mltg-mint-announce
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
